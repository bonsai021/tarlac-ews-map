<!DOCTYPE html>
<html>
<head>
    <title>Tarlac EWS Monitoring Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; background: #ffffff; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        
        /* Legend Styling */
        .info.legend {
            background: white; padding: 10px 14px;
            font-size: 14px; line-height: 24px;
            color: #333; box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px; border: 2px solid #2c3e50;
        }
        .info.legend i {
            width: 16px; height: 16px; float: left;
            margin-right: 8px; opacity: 0.9;
            border-radius: 50%; margin-top: 4px;
        }
        
        /* Removes background from the custom emoji icon */
        .custom-siren { background: none; border: none; }

        /* --- NEW: Network Health Dashboard Styling --- */
        .health-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #2c3e50;
            border-radius: 8px;
            padding: 16px;
            color: #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 220px;
        }

        .health-panel h3 {
            margin: 0 0 12px 0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #2c3e50;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .health-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: bold;
            color: #475569;
        }

        .health-stat:last-child { margin-bottom: 0; }

        .health-number {
            font-size: 14px;
            padding: 2px 10px;
            border-radius: 12px;
            color: white;
            min-width: 20px;
            text-align: center;
        }

        /* Tally Colors */
        .num-total { background: #2c3e50; }
        .num-up { background: #2e7d32; }
        .num-down { background: #c62828; }
        .num-maint { background: #ef6c00; }
        .num-reloc { background: #6a1b9a; }
    </style>
</head>
<body>

    <div class="health-panel">
        <h3>Network Health</h3>
        
        <div class="health-stat">
            <span>TOTAL SENSORS</span>
            <span class="health-number num-total" id="statTotal">0</span>
        </div>
        <div class="health-stat">
            <span>ACTIVE (UP)</span>
            <span class="health-number num-up" id="statUp">0</span>
        </div>
        <div class="health-stat">
            <span>OFFLINE (DOWN)</span>
            <span class="health-number num-down" id="statDown">0</span>
        </div>
        <div class="health-stat">
            <span>MAINTENANCE</span>
            <span class="health-number num-maint" id="statMaint">0</span>
        </div>
        <div class="health-stat">
            <span>RELOCATION</span>
            <span class="health-number num-reloc" id="statReloc">0</span>
        </div>
    </div>

    <div id="map"></div>

    <script>
        var map = L.map('map').setView([15.48, 120.59], 10);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        var ewsMarkers = L.featureGroup().addTo(map);

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT-3_dPrWSR7GQ9AKKIFJ9YRbbUHyJjx4_mWTwVuuqQ68oQhUN_yz4hqP2nreUu-U8eM5_grye4lefD/pub?output=csv'; 

        function getColor(status) {
            if (!status) return 'gray';
            var s = status.toUpperCase();
            if (s.includes('UP')) return '#2e7d32';
            if (s.includes('DOWN')) return '#c62828';
            if (s.includes('RELOCATION')) return '#6a1b9a';
            if (s.includes('MAINTENANCE')) return '#ef6c00';
            return '#1565c0';
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                
                // --- NEW: Tracking Variables for the Dashboard ---
                var counts = { total: 0, up: 0, down: 0, maint: 0, reloc: 0 };

                results.data.forEach(function(row) {
                    var lat = parseFloat(row['LATITUDE']);
                    var lng = parseFloat(row['LONGITUDE']); 
                    
                    if (!isNaN(lat) && !isNaN(lng)) {
                        
                        // --- NEW: Tally the Statuses ---
                        counts.total++;
                        var rawStatus = (row['Status'] || "").toUpperCase();
                        
                        if (rawStatus.includes('UP')) counts.up++;
                        else if (rawStatus.includes('DOWN')) counts.down++;
                        else if (rawStatus.includes('MAINTENANCE')) counts.maint++;
                        else if (rawStatus.includes('RELOCATION')) counts.reloc++;

                        var deviceType = row['DEVICE TYPE'] ? row['DEVICE TYPE'].toUpperCase() : "";
                        var metricsHtml = "";
                        
                        if (deviceType.includes('WLMS') && row['WATER_LEVEL_M']) {
                            metricsHtml += `<b>Water Level:</b> <span style="color:#0277bd; font-weight:bold;">${row['WATER_LEVEL_M']} m</span><br>`;
                        }
                        if (deviceType.includes('ARG') && row['RAINFALL_MM']) {
                            metricsHtml += `<b>Rainfall:</b> <span style="color:#0288d1; font-weight:bold;">${row['RAINFALL_MM']} mm</span><br>`;
                        }

                        var marker;
                        if (deviceType.includes('FEWS')) {
                            var sirenIcon = L.divIcon({
                                html: '<div style="font-size: 22px; line-height: 1; text-shadow: 1px 1px 2px black;">🚨</div>',
                                className: 'custom-siren',
                                iconSize: [22, 22],
                                iconAnchor: [11, 11]
                            });
                            marker = L.marker([lat, lng], { icon: sirenIcon });
                        } else {
                            marker = L.circleMarker([lat, lng], {
                                radius: 9,
                                fillColor: getColor(row['Status']),
                                color: "#fff",
                                weight: 2,
                                fillOpacity: 0.9
                            });
                        }

                        marker.bindPopup(`
                            <div style="line-height:1.6; min-width: 180px;">
                                <strong style="font-size:1.1em;">${row['LIST OF INSTRUMENT']}</strong><br>
                                <hr style="margin: 5px 0;">
                                <b>Type:</b> ${row['DEVICE TYPE']}<br>
                                <b>Status:</b> ${row['Status']}<br>
                                ${metricsHtml}
                                <hr style="margin: 5px 0;">
                                <small><b>Updated:</b> ${row['UPDATE:']}</small>
                            </div>
                        `).addTo(ewsMarkers);
                    }
                });

                // --- NEW: Inject tallies into the HTML ---
                document.getElementById('statTotal').innerText = counts.total;
                document.getElementById('statUp').innerText = counts.up;
                document.getElementById('statDown').innerText = counts.down;
                document.getElementById('statMaint').innerText = counts.maint;
                document.getElementById('statReloc').innerText = counts.reloc;

                if (ewsMarkers.getLayers().length > 0) {
                    map.fitBounds(ewsMarkers.getBounds(), { padding: [40, 40] });
                }
            }
        });

        // Add the Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<strong style="display:block; margin-bottom:8px;">Sensor Status</strong>';
            
            div.innerHTML += '<span style="font-size: 16px; margin-right: 6px;">🚨</span> Flood Warning (FEWS)<br>';
            div.innerHTML += '<hr style="margin: 5px 0;">';
            div.innerHTML += '<i style="background: #2e7d32"></i> UP<br>';
            div.innerHTML += '<i style="background: #c62828"></i> DOWN<br>';
            div.innerHTML += '<i style="background: #ef6c00"></i> UNDER MAINTENANCE<br>';
            div.innerHTML += '<i style="background: #6a1b9a"></i> FOR RELOCATION<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
